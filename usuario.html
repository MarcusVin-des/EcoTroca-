<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - EcoCircular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="container">
            <h1 class="logo">Eco<span>Circular</span></h1>
            <ul>
                <li><a href="index.html">Sair</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="card-painel">
            <h2>Cadastrar Novo Resíduo</h2>
            <form id="form-residuo">
                <div class="input-group">
                    <label for="empresa">Nome da Empresa:</label>
                    <input type="text" id="empresa" required placeholder="Ex: Tecidos Sorocaba">
                </div>
                
                <div class="input-group">
                    <label for="tipo-material">Tipo de Material:</label>
                    <input type="text" id="tipo-material" required placeholder="Ex: Retalhos de Algodão">
                </div>

                <div class="input-group">
                    <label for="quantidade">Quantidade (kg):</label>
                    <input type="number" id="quantidade" required placeholder="Ex: 50">
                </div>

                <div class="input-group">
                    <label for="contato-empresa">WhatsApp ou E-mail:</label>
                    <input type="text" id="contato-empresa" required placeholder="Ex: 15999999999">
                </div>

                <button type="submit" class="btn-save">Salvar no Sistema</button>
            </form>
        </section>

        <section class="card-painel" style="margin-top: 30px;">
            <h2>Materiais Disponíveis para Troca</h2>
            <div style="overflow-x: auto;">
                <table class="tabela-db">
                    <thead>
                        <tr>
                            <th>Empresa</th>
                            <th>Material</th>
                            <th>Qtd (kg)</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
